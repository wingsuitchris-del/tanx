name: Build Windows EXE

# Runs on every push to main, or manually from the Actions tab
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Needs write permission to create/update the GitHub Release
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2 with MinGW compiler
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make

      - name: Build tanx.exe
        run: make

      # Publish (or overwrite) the "latest" release so the download link
      # never changes — just go to /releases/latest to get the newest build
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Automatically built from the latest code on main."
          prerelease: true
          files: tanx.exe
